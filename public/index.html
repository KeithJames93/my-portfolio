<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="home" class="observe">
            <h1>Welcome</h1>
            <p>Add your content here</p>
        </section>

        <section id="about" class="observe">
            <h2>About</h2>
            <p>Tell your story</p>
        </section>

        <section id="projects" class="observe">
            <h2>Projects</h2>
            <div class="project-list">
                <div class="project-item observe">
                    <h3>Project</h3>
                    <p>Description</p>
                </div>
            </div>
        </section>

        <section id="contact" class="observe">
            <h2>Contact</h2>
            <form>
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Portfolio. All rights reserved.</p>
    </footer>

    <script type="module" src="script.module.js"></script>
</body>
</html>
